<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteWise - Login</title>
    <link rel="stylesheet" href="/static/login.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    {% include 'nav.html' %}

    <div class="wrapper">
        <div class="register-box">
            <h1>Register</h1>
            <form action="/register" method="post">
                <label for="fname">First name</label><br>
                <input type="text" id="fname" name="fname" value="Bengt"><br>
                <label for="lname">Email</label><br>
                <input type="text" id="lname" name="lname" value="Svensson"><br>
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" value="name@example.com"><br>
                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" value="******"><br>
                <input type="submit" value="Submit">

            </form>
            <p>Go to <a href="/login">login</a></p>
            <p class="error">{{error}}</p>

        </div>
    </div>

</body>

</html>
